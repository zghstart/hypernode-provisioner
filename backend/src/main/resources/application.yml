# HyperNode-Provisioner Backend
# Spring Boot 3 Application Configuration

spring:
  application:
    name: hypernode-provisioner

  profiles:
    active: dev

  # Web configuration
  web:
    flux:
      enabled: true

  # Security configuration
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin}

  # Server configuration
  server:
    port: 8080
    servlet:
      encoding:
        charset: UTF-8
        force: true
    ssl:
      enabled: false  # Enable in production
      key-store: classpath:keystore.p12
      key-store-password: ${KEYSTORE_PASSWORD:changeit}
    tomcat:
      threads:
        max: 200
        min-spare: 10

  # Data source configuration
  datasource:
    url: jdbc:postgresql://10.220.69.45:5432/hypernode
    username: postgres
    password: ${DB_PASSWORD:Dcs2018!}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Flyway database migration
  flyway:
    enabled: false

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        enable_lazy_load_no_trans: true

  # Redis configuration
  data:
    redis:
      host: ${REDIS_HOST:10.220.69.45}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Vault — disabled by default; set vault.enabled=true + env vars in production
vault:
  enabled: ${VAULT_ENABLED:false}

# Logging configuration
logging:
  level:
    root: INFO
    com.hypernode: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.data.redis: INFO
    org.springframework.vault: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,auditevents
  endpoint:
    health:
      show-details: WHEN_AUTHORIZED
      probes:
        enabled: true
    auditevents:
      enabled: true
